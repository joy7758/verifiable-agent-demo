<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Governance Stack</title>
  <desc id="desc">Reference architecture for auditable AI agent systems showing persona, runtime, trace, audit, governance, and evidence output layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10" />
    </filter>
    <style>
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #334155; }
      .section { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .node-title { font: 700 24px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .node-subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #334155; }
      .node-copy { font: 400 16px Arial, Helvetica, sans-serif; fill: #475569; }
      .footer { font: 400 18px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 600 15px Arial, Helvetica, sans-serif; fill: #475569; letter-spacing: 1px; text-transform: uppercase; }
      .line { stroke: #475569; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .box { rx: 24; ry: 24; filter: url(#shadow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)" />

  <text x="110" y="100" class="title">AI Agent Governance Stack</text>
  <text x="110" y="140" class="subtitle">Reference architecture for auditable AI agent systems</text>

  <rect x="110" y="178" width="1380" height="72" rx="18" ry="18" fill="#ffffff" opacity="0.85" />
  <text x="145" y="223" class="footer">Research view: persona identity, agent execution, structured traces, audit evidence, runtime governance, and machine-readable outputs.</text>

  <rect x="110" y="330" width="170" height="110" rx="55" ry="55" fill="#e2e8f0" />
  <text x="165" y="394" class="node-title">User</text>
  <text x="147" y="420" class="node-copy">task / intent input</text>

  <rect x="340" y="300" width="210" height="180" class="box" fill="#dbeafe" />
  <text x="368" y="338" class="small">Layer 1</text>
  <text x="368" y="380" class="node-title">Persona</text>
  <text x="368" y="410" class="node-subtitle">POP</text>
  <text x="368" y="445" class="node-copy">Identity, role, and</text>
  <text x="368" y="468" class="node-copy">permission model</text>

  <rect x="600" y="300" width="210" height="180" class="box" fill="#dcfce7" />
  <text x="628" y="338" class="small">Layer 2</text>
  <text x="628" y="380" class="node-title">Execution</text>
  <text x="628" y="410" class="node-subtitle">CrewAI Runtime</text>
  <text x="628" y="445" class="node-copy">Task orchestration</text>
  <text x="628" y="468" class="node-copy">and tool execution</text>

  <rect x="860" y="300" width="210" height="180" class="box" fill="#ffedd5" />
  <text x="888" y="338" class="small">Layer 3</text>
  <text x="888" y="380" class="node-title">Trace</text>
  <text x="888" y="410" class="node-subtitle">Execution Trace</text>
  <text x="888" y="445" class="node-copy">Structured runtime</text>
  <text x="888" y="468" class="node-copy">events and steps</text>

  <rect x="1120" y="300" width="210" height="180" class="box" fill="#fce7f3" />
  <text x="1148" y="338" class="small">Layer 4</text>
  <text x="1148" y="380" class="node-title">Audit</text>
  <text x="1148" y="410" class="node-subtitle">ARO Record</text>
  <text x="1148" y="445" class="node-copy">Append-only evidence</text>
  <text x="1148" y="468" class="node-copy">for verifiable execution</text>

  <rect x="1380" y="300" width="150" height="180" class="box" fill="#ede9fe" />
  <text x="1408" y="338" class="small">Layer 5</text>
  <text x="1408" y="380" class="node-title">Govern</text>
  <text x="1408" y="410" class="node-subtitle">Token Gov</text>
  <text x="1408" y="445" class="node-copy">Policy, cost,</text>
  <text x="1408" y="468" class="node-copy">and runtime control</text>

  <rect x="1220" y="600" width="270" height="120" class="box" fill="#ffffff" />
  <text x="1250" y="642" class="small">Output</text>
  <text x="1250" y="682" class="node-title">Evidence / Logs</text>
  <text x="1250" y="712" class="node-copy">JSON receipts, traces, audit bundles</text>

  <path d="M 280 385 L 340 385" class="line" />
  <path d="M 550 390 L 600 390" class="line" />
  <path d="M 810 390 L 860 390" class="line" />
  <path d="M 1070 390 L 1120 390" class="line" />
  <path d="M 1330 390 L 1380 390" class="line" />
  <path d="M 1455 480 L 1455 600" class="line" />

  <rect x="110" y="770" width="1380" height="80" rx="22" ry="22" fill="#ffffff" opacity="0.88" />
  <text x="145" y="818" class="footer">Uses: GitHub docs, community posts, conference slides, posters, and research materials.</text>
</svg>
