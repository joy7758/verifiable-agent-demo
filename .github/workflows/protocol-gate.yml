name: Verifiable Agent Gate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Verify deterministic sample bundle
        run: |
          python scripts/refresh_demo_samples.py --verify

      - name: Syntax check tracked Python files
        shell: bash
        run: |
          set -euo pipefail
          git ls-files -z '*.py' | xargs -0 -r -n 100 python -m py_compile
