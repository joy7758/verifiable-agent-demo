name: Render Mermaid Diagrams

on:
  push:
    paths:
      - "docs/**/*.mmd"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-mermaid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Render diagrams
        run: |
          find docs -name "*.mmd" -print0 | while IFS= read -r -d '' file; do
            svg="${file%.mmd}.svg"
            mmdc \
              -i "$file" \
              -o "$svg" \
              -w 2800 \
              -H 1800 \
              -b white \
              -c docs/figures/mermaid-publication-config.json
          done

      - name: Commit generated SVG
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: auto-render mermaid diagrams"
          file_pattern: "docs/**/*.svg"
