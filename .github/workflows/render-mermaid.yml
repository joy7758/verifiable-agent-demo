name: Render Mermaid Diagrams

on:
  push:
    paths:
      - "docs/**/*.mmd"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  render-mermaid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Render diagrams
        run: |
          find docs -name "*.mmd" -print0 | while IFS= read -r -d '' file; do
            svg="${file%.mmd}.svg"
            mmdc \
              -i "$file" \
              -o "$svg" \
              -w 2800 \
              -H 1800 \
              -b white \
              -c docs/figures/mermaid-publication-config.json \
              -p docs/figures/puppeteer-config.json
          done

      - name: Create pull request for rendered SVG
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ github.token }}
          commit-message: "docs: render mermaid diagrams"
          title: "docs: render mermaid diagrams"
          body: |
            Automated SVG refresh for Mermaid source changes.
          branch: "ci/render-mermaid-diagrams"
          delete-branch: true
          add-paths: |
            docs/**/*.svg
          labels: |
            ci
            documentation
